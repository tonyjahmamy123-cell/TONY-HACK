<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TONY-HACK v4.0 | Authentification</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: "Inter", sans-serif;
            background: linear-gradient(135deg, #0a0e14 0%, #1a1f2a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        
        .bg-animation {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
        }
        
        .bg-animation span {
            position: absolute;
            width: 4px; height: 4px;
            background: rgba(233, 69, 96, 0.2);
            border-radius: 50%;
            animation: float 15s infinite linear;
        }
        
        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.8; }
            90% { opacity: 0.8; }
            100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
        }
        
        .login-wrapper {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 450px;
            padding: 20px;
        }
        
        .login-card {
            background: rgba(26, 31, 42, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(233, 69, 96, 0.2);
            border-radius: 32px;
            padding: 48px 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(233, 69, 96, 0.1) inset;
            animation: slideIn 0.5s ease-out;
        }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .login-header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .logo-icon {
            width: 70px; height: 70px;
            margin: 0 auto 20px;
            background: linear-gradient(135deg, #e94560 0%, #ff6b6b 100%);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 30px rgba(233, 69, 96, 0.4);
        }
        
        .logo-icon i {
            font-size: 36px;
            color: white;
        }
        
        .login-header h1 {
            font-size: 36px;
            font-weight: 800;
            background: linear-gradient(135deg, #e94560, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 2px;
            margin-bottom: 8px;
        }
        
        .login-header p {
            color: #6b7a8f;
            font-size: 13px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        
        .version-badge {
            display: inline-block;
            background: rgba(233, 69, 96, 0.15);
            color: #e94560;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            margin-top: 8px;
        }
        
        .input-group {
            margin-bottom: 24px;
        }
        
        .input-label {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }
        
        .input-label i {
            color: #e94560;
            font-size: 14px;
            width: 20px;
        }
        
        .input-label span {
            color: #8a9ab0;
            font-size: 13px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .input-field {
            position: relative;
        }
        
        .input-field input {
            width: 100%;
            padding: 16px 20px;
            background: rgba(15, 20, 25, 0.8);
            border: 1.5px solid #2a3342;
            border-radius: 16px;
            color: white;
            font-size: 15px;
            font-weight: 500;
            outline: none;
            transition: all 0.3s ease;
        }
        
        .input-field input:focus {
            border-color: #e94560;
            background: rgba(26, 31, 42, 0.9);
            box-shadow: 0 0 0 4px rgba(233, 69, 96, 0.15);
        }
        
        .input-field input::placeholder {
            color: #4a5568;
            font-weight: 400;
        }
        
        .input-field .toggle-password {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #6b7a8f;
            cursor: pointer;
            transition: color 0.2s;
        }
        
        .input-field .toggle-password:hover {
            color: #e94560;
        }
        
        .login-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #e94560 0%, #ff6b6b 100%);
            color: white;
            border: none;
            border-radius: 16px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(233, 69, 96, 0.4);
        }
        
        .login-btn.loading {
            pointer-events: none;
            opacity: 0.7;
        }
        
        .login-btn .btn-loader {
            display: none;
            width: 20px; height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }
        
        .login-btn.loading .btn-text { display: none; }
        .login-btn.loading .btn-loader { display: block; }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 12px;
            padding: 14px 18px;
            margin-top: 20px;
            display: none;
            align-items: center;
            gap: 10px;
        }
        
        .error-message i { color: #ef4444; font-size: 16px; }
        .error-message span { color: #fca5a5; font-size: 13px; }
        .error-message.show { display: flex; animation: shake 0.5s ease; }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        
        .login-footer {
            text-align: center;
            margin-top: 24px;
            color: #4a5568;
            font-size: 11px;
            letter-spacing: 1px;
        }
        
        .security-badge {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 16px;
            padding: 10px;
            background: rgba(16, 185, 129, 0.1);
            border-radius: 30px;
        }
        
        .security-badge i { color: #10b981; font-size: 12px; }
        .security-badge span { color: #6ee7b7; font-size: 11px; font-weight: 500; }
    </style>
</head>
<body>
    <div class="bg-animation" id="bgAnimation"></div>
    
    <div class="login-wrapper">
        <div class="login-card">
            <div class="login-header">
                <div class="logo-icon">
                    <i class="fas fa-shield-hal"></i>
                </div>
                <h1>TONY-HACK</h1>
                <p>Phishing Simulator</p>
                <span class="version-badge">v4.0 PRO</span>
            </div>
            
            <form id="loginForm">
                <div class="input-group">
                    <div class="input-label">
                        <i class="fas fa-user"></i>
                        <span>Identifiant</span>
                    </div>
                    <div class="input-field">
                        <input type="text" id="username" placeholder="admin" autocomplete="username" required>
                    </div>
                </div>
                
                <div class="input-group">
                    <div class="input-label">
                        <i class="fas fa-lock"></i>
                        <span>Mot de passe</span>
                    </div>
                    <div class="input-field">
                        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required>
                        <i class="toggle-password fas fa-eye-slash" id="togglePassword"></i>
                    </div>
                </div>
                
                <div class="input-group">
                    <div class="input-label">
                        <i class="fas fa-key"></i>
                        <span>Code d'accès</span>
                    </div>
                    <div class="input-field">
                        <input type="password" id="access_code" placeholder="Code de sécurité" autocomplete="off" required>
                    </div>
                </div>
                
                <button type="submit" class="login-btn" id="loginBtn">
                    <span class="btn-text">Authentification</span>
                    <div class="btn-loader"></div>
                </button>
            </form>
            
            <div class="error-message" id="errorMessage">
                <i class="fas fa-exclamation-circle"></i>
                <span id="errorText"></span>
            </div>
            
            <div class="security-badge">
                <i class="fas fa-shield-alt"></i>
                <span>Connexion sécurisée • AES-256</span>
            </div>
            
            <div class="login-footer">
                © 2026 TONY-HACK v4.0 • WRITTEN BY TONY
            </div>
        </div>
    </div>
    
    <script>
        // Background animation
        const bgAnimation = document.getElementById("bgAnimation");
        for (let i = 0; i < 50; i++) {
            const span = document.createElement("span");
            span.style.left = Math.random() * 100 + "%";
            span.style.animationDelay = Math.random() * 15 + "s";
            span.style.animationDuration = (Math.random() * 10 + 10) + "s";
            bgAnimation.appendChild(span);
        }
        
        // Toggle password
        const togglePassword = document.getElementById("togglePassword");
        const passwordInput = document.getElementById("password");
        
        togglePassword.addEventListener("click", function() {
            const type = passwordInput.getAttribute("type") === "password" ? "text" : "password";
            passwordInput.setAttribute("type", type);
            this.classList.toggle("fa-eye");
            this.classList.toggle("fa-eye-slash");
        });
        
        // Form submission
        const loginForm = document.getElementById("loginForm");
        const loginBtn = document.getElementById("loginBtn");
        const errorMessage = document.getElementById("errorMessage");
        const errorText = document.getElementById("errorText");
        
        loginForm.addEventListener("submit", async (e) => {
            e.preventDefault();
            
            const username = document.getElementById("username").value;
            const password = document.getElementById("password").value;
            const accessCode = document.getElementById("access_code").value;
            
            if (!username || !password || !accessCode) {
                showError("Tous les champs sont obligatoires");
                return;
            }
            
            loginBtn.classList.add("loading");
            errorMessage.classList.remove("show");
            
            const formData = new FormData();
            formData.append("username", username);
            formData.append("password", password);
            formData.append("access_code", accessCode);
            
            try {
                const response = await fetch("/login", {
                    method: "POST",
                    body: formData
                });
                
                const data = await response.json();
                
                if (data.success) {
                    loginBtn.style.background = "linear-gradient(135deg, #10b981, #34d399)";
                    setTimeout(() => {
                        window.location.href = data.redirect;
                    }, 500);
                } else {
                    showError(data.message || "Identifiants invalides");
                    loginBtn.classList.remove("loading");
                }
            } catch (error) {
                showError("Erreur de connexion au serveur");
                loginBtn.classList.remove("loading");
            }
        });
        
        function showError(message) {
            errorText.textContent = message;
            errorMessage.classList.add("show");
            loginBtn.classList.remove("loading");
            
            setTimeout(() => {
                errorMessage.classList.remove("show");
            }, 5000);
        }
        
        document.getElementById("username").focus();
    </script>
</body>
</html>
