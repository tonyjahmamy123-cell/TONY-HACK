<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TONY-HACK | Statistiques Réelles</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "Inter", sans-serif; background: #0a0e14; color: #e0e0e0; display: flex; min-height: 100vh; }
        .sidebar { width: 300px; background: #1a1f2a; border-right: 1px solid #2a3342; padding: 24px 20px; position: fixed; top: 0; left: 0; bottom: 0; }
        .logo h2 { font-size: 24px; font-weight: 700; color: #e94560; }
        .nav-item { display: flex; align-items: center; gap: 14px; padding: 14px 18px; color: #8a9ab0; text-decoration: none; border-radius: 12px; margin-bottom: 6px; }
        .nav-item i { width: 26px; }
        .nav-item:hover { background: #2a3342; color: white; }
        .nav-item.active { background: #e94560; color: white; }
        .main-content { flex: 1; margin-left: 300px; padding: 32px 40px; }
        h1 { font-size: 32px; margin-bottom: 24px; color: white; }
        h1 i { color: #e94560; margin-right: 12px; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 20px; margin-bottom: 32px; }
        .stat-card { background: #1a1f2a; border: 1px solid #2a3342; border-radius: 20px; padding: 24px; }
        .stat-icon { width: 48px; height: 48px; background: rgba(233,69,96,0.15); border-radius: 14px; display: flex; align-items: center; justify-content: center; color: #e94560; font-size: 24px; margin-bottom: 16px; }
        .stat-value { font-size: 32px; font-weight: 700; color: white; }
        .stat-label { color: #6b7a8f; font-size: 14px; }
        
        .charts-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 24px; margin-bottom: 24px; }
        .chart-card { background: #1a1f2a; border: 1px solid #2a3342; border-radius: 20px; padding: 24px; }
        .chart-header { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
        .chart-header i { color: #e94560; }
        .chart-header h3 { color: white; font-size: 18px; }
        .chart-container { height: 250px; }
        .full-width { grid-column: span 2; }
        
        .empty-state { text-align: center; padding: 40px; color: #6b7a8f; }
        .empty-state i { font-size: 48px; color: #e94560; margin-bottom: 16px; }
    </style>
</head>
<body>
    <div class="app">
        <aside class="sidebar">
            <div class="logo"><h2>🔴 TONY-HACK</h2></div>
            <nav style="margin-top: 30px;">
                <a href="/" class="nav-item"><i class="fas fa-home"></i> Dashboard</a>
                <a href="/campaigns" class="nav-item"><i class="fas fa-bullseye"></i> Campagne Optimiser</a>
                <a href="/builder" class="nav-item"><i class="fas fa-code"></i> Code Editor</a>
                <a href="/templates" class="nav-item"><i class="fas fa-file-code"></i> Templates</a>
                <a href="/logs" class="nav-item"><i class="fas fa-history"></i> Logs</a>
                <a href="/statistics" class="nav-item active"><i class="fas fa-chart-bar"></i> Statistiques</a>
                <div class="nav-divider"></div>
                <a href="/settings" class="nav-item"><i class="fas fa-cog"></i> Paramètres</a>
                <a href="/profile" class="nav-item"><i class="fas fa-user"></i> Profil</a>
                <a href="#" class="nav-item" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Déconnexion</a>
            </nav>
        </aside>
        
        <main class="main-content">
            <h1><i class="fas fa-chart-pie"></i> Statistiques Réelles</h1>
            
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-database"></i></div>
                    <div class="stat-value" id="totalCaptures">0</div>
                    <div class="stat-label">Total Captures</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-globe"></i></div>
                    <div class="stat-value" id="uniqueCountries">0</div>
                    <div class="stat-label">Pays uniques</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-browser"></i></div>
                    <div class="stat-value" id="uniqueBrowsers">0</div>
                    <div class="stat-label">Navigateurs</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-desktop"></i></div>
                    <div class="stat-value" id="uniqueOS">0</div>
                    <div class="stat-label">OS</div>
                </div>
            </div>
            
            <div class="charts-grid">
                <div class="chart-card">
                    <div class="chart-header"><i class="fas fa-flag"></i><h3>Top Pays</h3></div>
                    <div class="chart-container"><canvas id="countriesChart"></canvas></div>
                </div>
                <div class="chart-card">
                    <div class="chart-header"><i class="fas fa-browser"></i><h3>Navigateurs</h3></div>
                    <div class="chart-container"><canvas id="browsersChart"></canvas></div>
                </div>
                <div class="chart-card">
                    <div class="chart-header"><i class="fas fa-windows"></i><h3>Systèmes d'exploitation</h3></div>
                    <div class="chart-container"><canvas id="osChart"></canvas></div>
                </div>
                <div class="chart-card">
                    <div class="chart-header"><i class="fas fa-clock"></i><h3>Heures de capture</h3></div>
                    <div class="chart-container"><canvas id="hourlyChart"></canvas></div>
                </div>
            </div>
        </main>
    </div>
    
    <script>
        let charts = {};
        
        async function loadStats() {
            const r = await fetch('/api/statistics/advanced');
            const data = await r.json();
            
            document.getElementById('totalCaptures').textContent = data.total;
            document.getElementById('uniqueCountries').textContent = data.countries.length;
            document.getElementById('uniqueBrowsers').textContent = data.browsers.length;
            document.getElementById('uniqueOS').textContent = data.os.length;
            
            // Pays
            if (charts.countries) charts.countries.destroy();
            charts.countries = new Chart(document.getElementById('countriesChart'), {
                type: 'bar',
                data: {
                    labels: data.countries.map(c => c.name),
                    datasets: [{
                        label: 'Captures',
                        data: data.countries.map(c => c.count),
                        backgroundColor: '#e94560',
                        borderRadius: 8
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
            });
            
            // Navigateurs
            if (charts.browsers) charts.browsers.destroy();
            const browserColors = { 'Chrome': '#4285f4', 'Safari': '#007aff', 'Firefox': '#ff9500', 'Edge': '#0078d7', 'Opera': '#ff1b2d', 'Autre': '#6b7a8f' };
            charts.browsers = new Chart(document.getElementById('browsersChart'), {
                type: 'doughnut',
                data: {
                    labels: data.browsers.map(b => b.name),
                    datasets: [{
                        data: data.browsers.map(b => b.count),
                        backgroundColor: data.browsers.map(b => browserColors[b.name] || '#6b7a8f')
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { color: '#8a9ab0' } } } }
            });
            
            // OS
            if (charts.os) charts.os.destroy();
            const osColors = { 'Windows': '#00a4ef', 'macOS': '#555', 'Android': '#3ddc84', 'iOS': '#999', 'Linux': '#f1c40f', 'Autre': '#6b7a8f' };
            charts.os = new Chart(document.getElementById('osChart'), {
                type: 'doughnut',
                data: {
                    labels: data.os.map(o => o.name),
                    datasets: [{
                        data: data.os.map(o => o.count),
                        backgroundColor: data.os.map(o => osColors[o.name] || '#6b7a8f')
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { color: '#8a9ab0' } } } }
            });
            
            // Heures
            if (charts.hourly) charts.hourly.destroy();
            charts.hourly = new Chart(document.getElementById('hourlyChart'), {
                type: 'line',
                data: {
                    labels: data.hourly.labels,
                    datasets: [{
                        label: 'Captures',
                        data: data.hourly.data,
                        borderColor: '#e94560',
                        backgroundColor: 'rgba(233,69,96,0.1)',
                        tension: 0.4,
                        fill: true
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
            });
        }
        
        // Déconnexion
        document.getElementById('logoutBtn').addEventListener('click', e => {
            e.preventDefault();
            if (confirm('Voulez-vous vous déconnecter ?')) {
                window.location.href = '/logout';
            }
        });
        
        loadStats();
    </script>
</body>
</html>
